<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="次卡管理">
<meta name="theme-color" content="#F9F9F9">
<meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>次卡管理 · 理发店</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;--purple:#5856D6;
  --bg:#F2F2F7;--white:#fff;--text:#1C1C1E;--text2:#8E8E93;--sep:#E5E5EA;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
.nav{
  padding:calc(var(--st) + 10px) 8px 10px;
  background:rgba(249,249,249,.94);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.nav-title{flex:1;font-size:17px;font-weight:600;text-align:center}
.nav-btn{color:var(--blue);font-size:17px;background:none;border:none;padding:6px 10px;cursor:pointer;white-space:nowrap;min-width:62px}
.nav-btn.bold{font-weight:700}
.nav-btn:active{opacity:.5}

/* PAGE */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(66px + var(--sb))}
.page.notabs{padding-bottom:calc(16px + var(--sb))}

/* TABS */
#tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(249,249,249,.94);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--sep);
  display:flex;padding:8px 0 calc(var(--sb) + 2px);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0}
.tab-ic{font-size:24px;line-height:1.2;transition:transform .12s}
.tab-lb{font-size:10px;color:var(--text2)}
.tab.on .tab-lb{color:var(--blue)}
.tab:active .tab-ic{transform:scale(.8)}

/* SECTION */
.sec{padding:16px 16px 0}
.sec-title{font-size:13px;color:var(--text2);margin-bottom:8px;padding-left:4px;font-weight:500}

/* SEARCH */
.search-wrap{padding:10px 16px;background:var(--bg)}
.search-box{background:rgba(118,118,128,.12);border-radius:10px;display:flex;align-items:center;gap:8px;padding:7px 12px}
.search-box input{flex:1;border:none;background:none;font-size:16px;color:var(--text);outline:none;caret-color:var(--blue)}

/* LIST CARD */
.lcard{background:var(--white);border-radius:12px;overflow:hidden;margin-bottom:16px}
.lcard.mx{margin-left:16px;margin-right:16px}

/* ROW */
.row{display:flex;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--bg)}
.row:last-child{border-bottom:none}
.row-lbl{font-size:15px;color:var(--text2);width:76px;flex-shrink:0}
.row-val{flex:1;font-size:15px;text-align:right}

/* MEMBER ITEM */
.mi{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--white);border-bottom:.5px solid var(--bg);cursor:pointer}
.mi:active{background:#EBEBF0}
.av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;background:linear-gradient(135deg,var(--blue),var(--purple))}
.mn{font-size:17px;font-weight:500}
.mp{font-size:13px;color:var(--text2);margin-top:2px}
.badge{padding:3px 10px;border-radius:20px;font-size:13px;font-weight:600;flex-shrink:0;margin-left:auto;background:rgba(52,199,89,.15);color:var(--green)}
.badge.low{background:rgba(255,149,0,.15);color:var(--orange)}
.badge.out{background:rgba(255,59,48,.12);color:var(--red)}

/* PUNCH CARD */
.pcard{
  margin:16px;border-radius:18px;padding:22px;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  color:white;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
}
.pcard::after{content:'✂';position:absolute;right:-10px;top:-10px;font-size:90px;opacity:.06;transform:rotate(-30deg);pointer-events:none}
.pc-shop{font-size:11px;opacity:.55;margin-bottom:14px;letter-spacing:1px;font-weight:500}
.pc-num{font-size:54px;font-weight:800;line-height:1;letter-spacing:-2px}
.pc-unit{font-size:14px;opacity:.65;margin-top:4px}
.pc-line{height:.5px;background:rgba(255,255,255,.2);margin:16px 0}
.pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr}
.pc-s-lbl{font-size:11px;opacity:.55;margin-bottom:4px}
.pc-s-val{font-size:16px;font-weight:700}
.gold{color:#FFD60A}

/* BUTTONS */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:17px;font-weight:600;cursor:pointer;text-align:center}
.btn:active{opacity:.75;transform:scale(.98)}
.btn-blue{background:var(--blue);color:white}
.btn-red{background:var(--red);color:white}
.btn-outline{background:var(--white);color:var(--blue);border:1.5px solid var(--blue)}
.btn-gray{background:rgba(142,142,147,.15);color:var(--text)}
/* Dashboard action group */
.dash-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:nowrap;background:none;padding:0;border-radius:0;box-shadow:none}
.dash-actions .btn{flex:1 1 0;min-width:0;display:inline-flex;align-items:center;justify-content:center;padding:8px 6px;gap:8px;width:auto;height:44px;line-height:1;border-radius:10px}
.dash-actions .btn-ic{font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.dash-actions .btn-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;font-size:15px}

@media (max-width:380px){
  .dash-actions .btn{padding:8px 6px}
  .dash-actions .btn-ic{font-size:16px}
  .dash-actions .btn-label{font-size:14px}
}

/* FORM */
.fcard{background:var(--white);border-radius:12px;overflow:hidden;margin-bottom:16px}
.fr{display:flex;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--bg)}
.fr:last-child{border-bottom:none}
.fl{font-size:15px;color:var(--text2);width:76px;flex-shrink:0}
.fi{flex:1;font-size:16px;border:none;background:none;outline:none;color:var(--text);text-align:right;caret-color:var(--blue)}
.fi::placeholder{color:#C7C7CC}

/* QUICK GRID */
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.qbtn{padding:13px 8px;background:var(--white);border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.qbtn:active{background:var(--sep)}

/* TXN */
.ti{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(--bg)}
.ti:last-child{border-bottom:none}
.tic{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tic.use{background:rgba(255,59,48,.1)}
.tic.charge{background:rgba(52,199,89,.1)}
.tt{flex:1;min-width:0}
.ttitle{font-size:15px}
.ttime{font-size:12px;color:var(--text2);margin-top:2px}
.tamt{font-size:15px;font-weight:600;flex-shrink:0}
.tamt.use{color:var(--red)}
.tamt.charge{color:var(--green)}

/* CARD RECORD ROW */
.cr{display:flex;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--bg)}
.cr:last-child{border-bottom:none}
.cr-left{flex:1}
.cr-name{font-size:15px;font-weight:500}
.cr-sub{font-size:12px;color:var(--text2);margin-top:3px}
.cr-right{text-align:right;flex-shrink:0}
.cr-remain{font-size:18px;font-weight:700}
.cr-remain.done{color:var(--text2)}
.cr-used{font-size:12px;color:var(--text2);margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:80px 32px}
.empty-ic{font-size:56px;opacity:.35;margin-bottom:16px}
.empty-t{font-size:17px;font-weight:500}
.empty-s{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.5}

/* TOAST */
.toast{
  position:fixed;left:50%;top:calc(var(--st) + 58px);transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:white;padding:10px 22px;border-radius:22px;
  font-size:15px;z-index:999;white-space:nowrap;pointer-events:none;
  animation:tin .2s ease;
}
@keyframes tin{from{opacity:0;transform:translate(-50%,-6px)}to{opacity:1;transform:translate(-50%,0)}}

/* PULL TO REFRESH */
.ptr{
  position:sticky;top:0;z-index:10;
  text-align:center;height:0;overflow:hidden;
  transition:height .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.ptr-spinner{
  font-size:22px;display:inline-block;
  transition:transform .2s;
}
.ptr.active .ptr-spinner{
  animation:ptrspin .6s linear infinite;
}
@keyframes ptrspin{to{transform:rotate(360deg)}}

.mt8{margin-top:8px}
.mt16{margin-top:16px}

/* CARD TYPE */
.type-row{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:7px 0;background:var(--white);border:2px solid var(--sep);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);text-align:center;transition:all .15s}
.type-btn.on{border-color:var(--blue);color:var(--blue);background:rgba(0,122,255,.06)}
.type-btn:active{opacity:.7}
.type-badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500;margin-right:4px}
.type-badge.t-洗{background:#e3f6f0;color:#0d9}
.type-badge.t-剪{background:#eef0ff;color:#56f}
.type-badge.t-染{background:#fff3e6;color:#f90}
.type-badge.t-烫{background:#ffe8ee;color:#f36}
.card-pick-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;margin:6px 0;background:var(--bg);border-radius:10px;
  cursor:pointer;border:2px solid transparent;transition:border .15s;
}
.card-pick-item:active,.card-pick-item.sel{border-color:var(--blue);background:rgba(0,122,255,.04)}
.card-pick-item .cpi-left{display:flex;align-items:center;gap:6px}
.card-pick-item .cpi-remain{font-size:20px;font-weight:600;color:var(--blue)}
.card-pick-item .cpi-info{text-align:left}
.card-pick-item .cpi-title{font-size:14px;font-weight:500}
.card-pick-item .cpi-sub{font-size:12px;color:var(--text2)}
.tip{margin:0 16px 16px;padding:14px;background:rgba(0,122,255,.08);border-radius:12px;font-size:13px;color:var(--blue);line-height:1.6}

/* STATS */
.st-period{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 16px;background:var(--white);margin:0 0 16px;border-radius:12px}
.st-period .st-arrow{background:none;border:none;font-size:22px;color:var(--blue);cursor:pointer;padding:4px 8px}
.st-period .st-arrow:active{opacity:.5}
.st-period .st-label{font-size:17px;font-weight:600;min-width:120px;text-align:center}
.st-mode{display:flex;margin:0 0 16px;background:var(--bg);border-radius:8px;padding:2px}
.st-mode button{flex:1;padding:7px 0;border:none;background:none;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:6px;transition:all .15s}
.st-mode button.on{background:var(--white);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 16px;padding:0;width:100%}
.st-card{background:var(--white);border-radius:12px;padding:14px 16px}
.st-card .st-val{font-size:26px;font-weight:700;line-height:1.2}
.st-card .st-val.green{color:var(--green)}
.st-card .st-val.blue{color:var(--blue)}
.st-card .st-val.orange{color:var(--orange)}
.st-card .st-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.st-break{background:var(--white);border-radius:12px;margin:0 0 16px;overflow:hidden;width:100%}
.st-break-title{font-size:13px;color:var(--text2);padding:12px 16px 6px;font-weight:500}
.st-break-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:.5px solid var(--bg)}
.st-break-row:last-child{border-bottom:none}
.st-break-row .st-b-name{display:flex;align-items:center;gap:6px;font-size:15px}
.st-break-row .st-b-val{font-size:15px;font-weight:600}

/* CLOUD STATUS INDICATOR */
#cloud-indicator{
  position:fixed;right:12px;bottom:calc(72px + var(--sb));z-index:100;
  display:none;align-items:center;gap:6px;
  font-size:12px;color:#fff;
  background:rgba(0,0,0,.78);padding:5px 11px;border-radius:14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;
  animation:cloudin .18s ease;
}
#cloud-indicator.show{display:flex}
@keyframes cloudin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
#cloud-indicator .cloud-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
#cloud-indicator.syncing .cloud-dot{animation:cloudpulse .9s ease-in-out infinite}
@keyframes cloudpulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
#cloud-indicator.ok{background:rgba(52,199,89,.94)}
#cloud-indicator.fail{background:rgba(255,59,48,.94);pointer-events:auto;cursor:pointer}
#cloud-indicator.fail:active{opacity:.75}

/* MODAL */
.modal-mask{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;padding:24px;
  animation:fadein .18s ease;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  background:rgba(242,242,247,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:14px;width:100%;max-width:280px;overflow:hidden;
  animation:modalin .22s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes modalin{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
.modal-body{padding:18px 16px 14px;text-align:center}
.modal-title{font-size:17px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);line-height:1.4;margin-bottom:14px}
.modal-input{
  width:100%;background:var(--white);border:.5px solid var(--sep);border-radius:8px;
  padding:9px 11px;font-size:14px;color:var(--text);outline:none;font-family:inherit;
  resize:none;line-height:1.4;
}
.modal-input:focus{border-color:var(--blue)}
.modal-quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.modal-chip{
  padding:5px 11px;background:rgba(0,122,255,.1);color:var(--blue);
  border:none;border-radius:14px;font-size:13px;cursor:pointer;
}
.modal-chip:active{background:rgba(0,122,255,.22)}
.modal-acts{display:flex;border-top:.5px solid rgba(0,0,0,.1)}
.modal-act{
  flex:1;padding:12px;background:none;border:none;font-size:17px;
  color:var(--blue);cursor:pointer;font-family:inherit;
}
.modal-act.primary{font-weight:600}
.modal-act.danger{color:var(--red)}
.modal-act:active{background:rgba(0,0,0,.06)}
.modal-act + .modal-act{border-left:.5px solid rgba(0,0,0,.1)}
</style>
</head>
<body>
<div id="cloud-indicator"></div>
<div id="app"></div>
<nav id="tabs">
  <button class="tab on" id="tab-home" onclick="goTab('home')">
    <span class="tab-ic">🏠</span><span class="tab-lb">仪表盘</span>
  </button>
  <button class="tab" id="tab-members" onclick="goTab('members')">
    <span class="tab-ic">👥</span><span class="tab-lb">会员</span>
  </button>
  <button class="tab" id="tab-stats" onclick="goTab('stats')">
    <span class="tab-ic">📊</span><span class="tab-lb">统计</span>
  </button>
  <button class="tab" id="tab-backup" onclick="goTab('backup')">
    <span class="tab-ic">☁️</span><span class="tab-lb">备份</span>
  </button>
</nav>
<script>
'use strict';

// ── IndexedDB ──────────────────────────────────────────────
const DB = (() => {
  let _db = null;
  const open = () => new Promise((ok, err) => {
    if (_db) return ok(_db);
    const r = indexedDB.open('haircard_v1');
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('members')) d.createObjectStore('members', {keyPath:'id'});
      if (!d.objectStoreNames.contains('cards')) {
        const cs = d.createObjectStore('cards', {keyPath:'id'});
        cs.createIndex('mid','memberId');
      }
      if (!d.objectStoreNames.contains('txns')) {
        const ts = d.createObjectStore('txns', {keyPath:'id'});
        ts.createIndex('mid','memberId');
      }
    };
    r.onsuccess = e => { _db = e.target.result; ok(_db); };
    r.onerror = () => err(r.error);
  });

  const run = async (stores, mode, fn) => {
    const d = await open();
    return new Promise((ok, err) => {
      const tx = d.transaction(stores, mode);
      tx.onerror = () => err(tx.error);
      fn(tx, ok);
    });
  };

  return {
    getAll: store => run([store],'readonly',(tx,ok) => { const r=tx.objectStore(store).getAll(); r.onsuccess=()=>ok(r.result); }),
    get: (store,id) => run([store],'readonly',(tx,ok) => { const r=tx.objectStore(store).get(id); r.onsuccess=()=>ok(r.result); }),
    put: (store,obj) => run([store],'readwrite',(tx,ok) => { const r=tx.objectStore(store).put(obj); r.onsuccess=()=>ok(); }),
    del: (store,id) => run([store],'readwrite',(tx,ok) => { const r=tx.objectStore(store).delete(id); r.onsuccess=()=>ok(); }),
    byIdx: (store,idx,val) => run([store],'readonly',(tx,ok) => { const r=tx.objectStore(store).index(idx).getAll(val); r.onsuccess=()=>ok(r.result); }),
    // 原子多 store 写入：ops = [{op:'put', store, obj} | {op:'del', store, id}]
    multi: (ops) => {
      if (!ops.length) return Promise.resolve();
      const stores = [...new Set(ops.map(o => o.store))];
      return run(stores,'readwrite',(tx,ok) => {
        ops.forEach(o => {
          const s = tx.objectStore(o.store);
          if (o.op === 'put') s.put(o.obj);
          else if (o.op === 'del') s.delete(o.id);
        });
        tx.oncomplete = () => ok();
      });
    },

    async upgrade() {
      const d = await open();
      if (d.objectStoreNames.contains('deleted')) return;
      return new Promise((ok, err) => {
        d.close(); _db = null;
        const r = indexedDB.open('haircard_v1', (d.version||1)+1);
        r.onupgradeneeded = e => e.target.result.createObjectStore('deleted',{keyPath:'id'});
        r.onsuccess = e => { _db = e.target.result; ok(); };
        r.onerror = () => err(r.error);
      });
    },

    async exportAll() {
      const [members,cards,txns,deleted] = await Promise.all([
        this.getAll('members'),this.getAll('cards'),this.getAll('txns'),
        this.getAll('deleted').catch(()=>[])
      ]);
      return {v:1, exportedAt:Date.now(), members, cards, txns, deleted};
    },
    async importAll(data) {
      const d = await open();
      // 确保 deleted store 存在
      if (!d.objectStoreNames.contains('deleted')) {
        await new Promise((ok,err) => {
          d.close(); _db = null;
          const r = indexedDB.open('haircard_v1', (d.version||1)+1);
          r.onupgradeneeded = e => e.target.result.createObjectStore('deleted',{keyPath:'id'});
          r.onsuccess = e => { _db = e.target.result; ok(); };
          r.onerror = () => err(r.error);
        });
      }
      const nd = await open();
      return new Promise((ok,err) => {
        const stores = ['members','cards','txns','deleted'];
        const tx = nd.transaction(stores,'readwrite');
        stores.forEach(s => tx.objectStore(s).clear());
        (data.members||[]).forEach(m => tx.objectStore('members').put(m));
        (data.cards||[]).forEach(c => tx.objectStore('cards').put(c));
        (data.txns||[]).forEach(t => tx.objectStore('txns').put(t));
        (data.deleted||[]).forEach(d => tx.objectStore('deleted').put(d));
        tx.oncomplete = ok;
        tx.onerror = () => err(tx.error);
      });
    }
  };
})();

// ── Cloud Sync (Cloudflare KV) ─────────────────────────────
const Cloud = (() => {
  const LS = 'haircard_cloud';
  const ENDPOINT = '/api/data';
  // 填上 Cloudflare Turnstile sitekey 以启用 PUT 人机校验；留空则跳过（开发期）
  // const TURNSTILE_SITEKEY = '0x4AAAAAADej9dJ2nBUuYEx5';
  const TURNSTILE_SITEKEY = '1x00000000000000000000AA';
  let cfg = null, timer = null, busy = false;

  // ── Turnstile：懒加载脚本，invisible 模式拿一次性 token ──
  let _tsLoadPromise = null;
  const loadTurnstile = () => {
    if (!TURNSTILE_SITEKEY) return Promise.resolve(null);
    if (_tsLoadPromise) return _tsLoadPromise;
    _tsLoadPromise = new Promise((resolve, reject) => {
      if (window.turnstile) return resolve(window.turnstile);
      const s = document.createElement('script');
      s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
      s.async = true; s.defer = true;
      s.onload = () => resolve(window.turnstile);
      s.onerror = () => { _tsLoadPromise = null; reject(new Error('turnstile script load failed')); };
      document.head.appendChild(s);
    });
    return _tsLoadPromise;
  };
  const getTurnstileToken = async () => {
    if (!TURNSTILE_SITEKEY) return null;
    const ts = await loadTurnstile();
    if (!ts) return null;
    const c = document.createElement('div');
    // size:'invisible' 自身不渲染可见 UI；容器只需在 DOM 里有正常布局，
    // 不要用 left:-9999px / display:none / visibility:hidden，
    // 否则 Turnstile 反爬会判为可疑环境 → 报错 600010
    c.style.cssText = 'position:fixed;left:0;top:0;width:0;height:0;overflow:hidden;pointer-events:none';
    document.body.appendChild(c);
    return new Promise((resolve, reject) => {
      let done = false;
      let widgetId = null;
      const finish = (fn, val) => {
        if (done) return; done = true;
        try { if (widgetId !== null) ts.remove(widgetId); } catch (e) {}
        c.remove();
        fn(val);
      };
      try {
        widgetId = ts.render(c, {
          sitekey: TURNSTILE_SITEKEY,
          // 不传 size：invisible 行为由 dashboard 里 widget mode 控制（Cloudflare 已弃用 size:'invisible'）
          // 默认 execution:'render'：render 之后自动开解题，解完调 callback
          appearance: 'execute',  // 仅在确实需要交互时才显示 UI，invisible 模式下永远不显示
          callback: token => finish(resolve, token),
          'error-callback': (err) => { console.warn('[turnstile] error-callback:', err); finish(reject, new Error('turnstile error: ' + (err || 'unknown'))); },
          'expired-callback': () => finish(reject, new Error('turnstile token expired')),
          'timeout-callback': () => finish(reject, new Error('turnstile challenge timeout')),
        });
      } catch (e) {
        finish(reject, new Error('turnstile render failed: ' + e.message));
        return;
      }
      setTimeout(() => finish(reject, new Error('turnstile overall timeout')), 15000);
    });
  };

  try { cfg = JSON.parse(localStorage.getItem(LS) || 'null'); } catch { cfg = null; }

  const save = c => { cfg = c; c ? localStorage.setItem(LS, JSON.stringify(c)) : localStorage.removeItem(LS); };

  const genShopKey = () => {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 去掉 0/O/1/I 等易混；32 字符正好可整除 256，无偏置
    const buf = crypto.getRandomValues(new Uint8Array(8));
    return Array.from(buf, b => c[b % c.length]).join('');
  };

  const sha256 = async s => {
    const buf = new TextEncoder().encode(s);
    const h = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
  };

  const derive = (shopKey, password) => sha256(`${shopKey}:${password}:haircard-v1`);

  // AES-GCM 加密密钥派生（与 hashedKey 独立，不影响现有服务端 key）
  const deriveEncKey = async (shopKey, password) => {
    const hex = await sha256(`${shopKey}:${password}:haircard-enc-v1`);
    const raw = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
    return crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
  };

  // 加密：JSON → gzip → AES-GCM → [0x48, iv(12), ciphertext]
  const enc = async (jsonStr, key) => {
    const compressed = await gzip(jsonStr);
    const plainBuf = await compressed.arrayBuffer();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, plainBuf);
    const out = new Uint8Array(1 + 12 + ct.byteLength);
    out[0] = 0x48; // 'H' = haircard encrypted
    out.set(iv, 1);
    out.set(new Uint8Array(ct), 13);
    return out.buffer;
  };

  // 解密：[0x48, iv(12), ciphertext] → AES-GCM → gunzip → JSON
  const dec = async (buf, key) => {
    const arr = new Uint8Array(buf);
    if (arr[0] !== 0x48) throw new Error('not encrypted');
    const iv = arr.slice(1, 13);
    const ct = arr.slice(13);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return gunzip(new Blob([plain]));
  };

  const isOn = () => !!(cfg && cfg.hashedKey);

  let okHideTimer = null;
  const setStatus = (state, msg) => {
    const el = document.getElementById('cloud-indicator');
    if (!el) return;
    // 保留 fail 状态：只能由 syncing/ok 覆盖，避免被静默 autoSync 的 null 清掉
    if (state === null && el.classList.contains('fail')) return;
    if (okHideTimer) { clearTimeout(okHideTimer); okHideTimer = null; }
    if (!state) { el.className = ''; el.textContent = ''; return; }
    el.className = 'show ' + state;
    el.innerHTML = `<span class="cloud-dot"></span><span>${msg}</span>`;
    if (state === 'ok') {
      okHideTimer = setTimeout(() => { el.className = ''; el.textContent = ''; }, 1500);
    }
  };

  // ── gzip 压缩/解压工具 ─────────────────────────────────
  const gzip = async (str) => {
    const blob = new Blob([str]);
    const cs = new CompressionStream('gzip');
    const stream = blob.stream().pipeThrough(cs);
    return new Blob([await new Response(stream).arrayBuffer()]);
  };

  const gunzip = async (blob) => {
    const ds = new DecompressionStream('gzip');
    const stream = blob.stream().pipeThrough(ds);
    return new Response(stream).text();
  };

  // 解码远端响应（仅支持加密格式）
  const _decode = async (resp, shopKey, password) => {
    const buf = await resp.arrayBuffer();
    const text = await dec(buf, await deriveEncKey(shopKey, password));
    return JSON.parse(text);
  };

  // ── Pull: 拉取远端数据 ──────────────────────────────────
  // 返回 { ok:true, data: object|null }（data=null 表示真的没数据 / 404）
  // 或 { ok:false, reason }（网络、5xx、解密失败等真错误 —— 此时禁止 push，避免陈旧覆盖）
  const pull = async () => {
    if (!isOn()) return { ok:true, data:null };
    try {
      const r = await fetch(`${ENDPOINT}?key=${cfg.hashedKey}`, {
        headers: {'cache-control': 'no-cache'}
      });
      if (r.status === 404) return { ok:true, data:null };
      if (!r.ok) return { ok:false, reason:'http_'+r.status };
      const j = await _decode(r, cfg.shopKey, cfg.password);
      return { ok:true, data: j.data || null };
    } catch (e) {
      return { ok:false, reason: e.message || 'pull_error' };
    }
  };

  // ── Merge: 按记录级别合并本地与远端，时间戳晚的赢 ────
  const merge = async (remote) => {
    if (!remote) return false;
    window._merging = true;
    try {
      // 合并墓碑：保留完整对象（含 type），取 deletedAt 较晚的
      const remoteTombs = remote.deleted || [];
      const localTombs = await DB.getAll('deleted').catch(() => []);
      const tombMap = new Map(remoteTombs.map(t => [t.id, {...t}]));
      localTombs.forEach(t => {
        const existing = tombMap.get(t.id);
        if (!existing || t.deletedAt > existing.deletedAt) tombMap.set(t.id, {...t});
      });

      const delByType = (type) => new Set(
        [...tombMap.values()].filter(t => t.type === type).map(t => t.id)
      );
      const delMemberIds = delByType('member');
      const delCardIds = delByType('card');
      const delTxnIds = delByType('txn');

      const [localMembers, localCards, localTxns] = await Promise.all([
        DB.getAll('members'), DB.getAll('cards'), DB.getAll('txns')
      ]);

      const mergeStore = async (store, localItems, remoteItems, delIds) => {
        const lm = new Map(localItems.map(i => [i.id, i]));
        for (const ri of (remoteItems || [])) {
          if (delIds.has(ri.id)) continue;
          const local = lm.get(ri.id);
          if (!local) { await DB.put(store, ri); }
          else if ((ri.updatedAt||ri.createdAt||0) > (local.updatedAt||local.createdAt||0)) { await DB.put(store, ri); }
        }
        for (const [id] of lm) {
          if (delIds.has(id)) await DB.del(store, id);
        }
        return lm; // 返回合并后的 Map，用于墓碑过期判断
      };

      const mMembers = await mergeStore('members', localMembers, remote.members, delMemberIds);
      const mCards = await mergeStore('cards', localCards, remote.cards, delCardIds);
      const mTxns = await mergeStore('txns', localTxns, remote.txns, delTxnIds);

      // 合并后根据 txn 反算 card.used（txn 是 source of truth，防止并发扣减丢次数）
      const allTxns = [...mTxns.values(), ...(remote.txns || []).filter(t => !mTxns.has(t.id) && !delTxnIds.has(t.id))];
      const usedByCard = new Map();
      for (const t of allTxns) {
        if (t.cardId && t.type === 'use') usedByCard.set(t.cardId, (usedByCard.get(t.cardId) || 0) + (t.sessions || 1));
      }
      // 读 DB 中所有卡（包含远端新增的），而不只是本地 Map
      const dbCards = await DB.getAll('cards');
      for (const card of dbCards) {
        if (delCardIds.has(card.id)) continue;
        const correct = usedByCard.get(card.id) || 0;
        if (card.used !== correct) {
          card.used = correct;
          card.updatedAt = Date.now();
          await DB.put('cards', card);
        }
      }

      // 保存合并后的墓碑（保留 type 字段）
      for (const [, t] of tombMap) {
        await DB.put('deleted', t);
      }

      // 清理过期墓碑：超过 180 天且对应记录确实不存在了（容忍员工长期不开 App）
      const cutoff = Date.now() - 180 * 86400000;
      const allIds = new Set([...mMembers.keys(), ...mCards.keys(), ...mTxns.keys()]);
      const finalTombs = [...tombMap.values()].filter(t => {
        if (t.deletedAt < cutoff && !allIds.has(t.id)) return false;
        return true;
      });
      // 清空重建
      const allDel = await DB.getAll('deleted').catch(()=>[]);
      for (const old of allDel) await DB.del('deleted', old.id);
      for (const t of finalTombs) await DB.put('deleted', t);

      return true;
    } finally {
      window._merging = false;
    }
  };

  const disconnect = () => save(null);

  // ── 统一同步入口 ──────────────────────────────────────
  // needPush=true: pull → merge → upload（本地有改动时）
  // needPush=false: pull → merge → render（只拉取不上传）
  const sync = async (needPush = false) => {
    if (!isOn()) return false;
    if (busy) {
      // 如果当前 busy 且需要 push，等它完成后再追一次（最多等 8 秒）
      if (needPush) {
        await new Promise(r => {
          let waited = 0;
          const t = setInterval(() => {
            waited += 300;
            if (!busy || waited > 8000) { clearInterval(t); r(); }
          }, 300);
        });
      } else {
        return false; // 只读同步直接跳过
      }
    }
    busy = true;
    if (needPush) setStatus('syncing', '同步中…');
    try {
      // 1. 拉取远端
      const pulled = await pull();
      if (!pulled.ok) {
        // 真错误（网络/5xx/解密失败）：禁止 push，避免用本地陈旧快照覆盖云端
        console.warn('[sync] pull failed:', pulled.reason);
        setStatus('fail', '同步失败 · 点此重试');
        return false;
      }
      // 2. 合并
      const merged = await merge(pulled.data);
      // 3. 如果需要上传
      if (needPush) {
        const data = await DB.exportAll();
        const jsonStr = JSON.stringify({data, modifiedAt: Date.now(), v: 1});
        const encKey = await deriveEncKey(cfg.shopKey, cfg.password);
        const encrypted = await enc(jsonStr, encKey);
        const headers = {'content-type':'application/octet-stream'};
        try {
          const tsToken = await getTurnstileToken();
          if (tsToken) headers['cf-turnstile-token'] = tsToken;
        } catch (e) {
          // 拿不到 token 也照样发；服务端会决定接不接
          console.warn('[sync] turnstile token unavailable:', e.message);
        }
        const r = await fetch(`${ENDPOINT}?key=${cfg.hashedKey}`, {
          method:'PUT',
          headers,
          body: encrypted
        });
        if (r.status === 403) throw new Error('人机校验失败');
        if (r.status === 503) throw new Error('云端今日写入额度已满，明天再试');
        if (!r.ok) throw new Error('http '+r.status);
        cfg.lastSync = Date.now();
        save(cfg);
      }
      // 有实际数据变动时才显示状态
      if (needPush || merged) setStatus('ok', '已同步');
      else setStatus(null); // 无变动，静默（setStatus 内部会保留已有 fail）
      // 4. 刷新视图：表单页跳过，避免清空用户正在填写的输入
      if (typeof render === 'function' && (needPush || merged) && !FORM_VIEWS.includes(curView)) render();
      return true;
    } catch (e) {
      console.warn('[sync] failed', e);
      const msg = (e && e.message && /[一-龥]/.test(e.message))
        ? `同步失败：${e.message}`
        : '同步失败 · 点此重试';
      setStatus('fail', msg);
      return false;
    } finally {
      busy = false;
    }
  };

  // 本地写操作后：延迟 3 秒触发完整同步（pull+merge+push）
  const schedulePush = () => {
    if (!isOn()) return;
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => sync(true), 3000);
  };

  // 页面可见时 / 下拉刷新：只拉取不上传
  const autoSync = () => sync(false);

  // 完整同步（pull+merge+push），手动同步按钮用
  const push = () => sync(true);

  const setup = async (shopKey, password) => {
    const hashed = await derive(shopKey, password);
    save({shopKey, password, hashedKey: hashed, lastSync: 0, createdAt: Date.now()});
    const ok = await sync(true);
    if (!ok) { save(null); throw new Error('上传失败，请检查网络'); }
    return true;
  };

  const restore = async (shopKey, password) => {
    const hashed = await derive(shopKey, password);
    const r = await fetch(`${ENDPOINT}?key=${hashed}`);
    if (r.status === 404) throw new Error('not_found');
    if (!r.ok) throw new Error('http_'+r.status);
    const j = await _decode(r, shopKey, password);
    if (!j.data || !Array.isArray(j.data.members)) throw new Error('bad_payload');
    await DB.importAll(j.data);
    save({shopKey, password, hashedKey: hashed, lastSync: Date.now(), createdAt: Date.now()});
    return true;
  };

  // 切后台/关闭前：立刻冲刷未完成的 push
  const flush = () => {
    if (!isOn() || !timer) return;
    clearTimeout(timer); timer = null;
    sync(true); // flush 不等结果，尽力而为；若 busy 会排队等
  };
  window.addEventListener('pagehide', flush);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') flush();
    else autoSync();
  });

  return { isOn, getCfg: () => cfg, sync, push, schedulePush, autoSync, setup, restore, disconnect, genShopKey };
})();

// 包裹 DB 的写操作，触发自动云同步（merge 期间静默，避免多余 push）
['put','del','multi'].forEach(m => {
  const orig = DB[m].bind(DB);
  DB[m] = async function(...args) {
    const r = await orig(...args);
    if (!window._merging) Cloud.schedulePush();
    return r;
  };
});

function fmtFull(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtShort(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString()===now.toDateString())
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  if (d.getFullYear()===now.getFullYear())
    return `${d.getMonth()+1}月${d.getDate()}日`;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

let _toast = null;
function toast(msg) {
  if (_toast) _toast.remove();
  _toast = document.createElement('div');
  _toast.className = 'toast';
  _toast.textContent = msg;
  document.body.appendChild(_toast);
  setTimeout(()=>{ if(_toast){_toast.style.opacity='0';_toast.style.transition='opacity .3s';setTimeout(()=>_toast&&_toast.remove(),300);} }, 2200);
}

// ── Router ─────────────────────────────────────────────────
let curView = 'home', curParams = {}, stack = [];
const MAIN_VIEWS = ['home','members','stats','backup'];
const FORM_VIEWS = ['addMember','addCard']; // 这些视图后台同步时不重渲，避免吞掉用户输入

function goTab(view) { stack=[]; navigate(view,{},false); }
function goBack() { const p=stack.pop(); if(p) navigate(p.view,p.params,false); else goTab('home'); }

function navigate(view, params={}, push=true) {
  if (push) stack.push({view:curView, params:curParams});
  curView = view; curParams = params;
  render();
}

// ── Render ─────────────────────────────────────────────────
function render() {
  const isMain = MAIN_VIEWS.includes(curView);
  document.getElementById('tabs').style.display = isMain ? 'flex' : 'none';
  MAIN_VIEWS.forEach(v => {
    const el = document.getElementById('tab-'+v);
    if (el) el.className = 'tab' + (curView===v?' on':'');
  });
  const views = {home:vHome, members:vMembers, stats:vStats, member:vMember, addMember:vAddMember, addCard:vAddCard, backup:vBackup};
  (views[curView]||vHome)();
}

async function loadList(q, mode = 'recent') {
  const [members, cards] = await Promise.all([DB.getAll('members'), DB.getAll('cards')]);
  const stats = {};
  cards.forEach(c => { stats[c.memberId] = (stats[c.memberId]||0) + (c.total-c.used); });
  let list = q
    ? members.filter(m => m.name.includes(q) || (m.phone&&m.phone.includes(q)))
    : members;

  if (mode === 'name') {
    list.sort((a,b) => a.name.localeCompare(b.name,'zh'));
  } else {
    list.sort((a,b) => (b.updatedAt||b.createdAt) - (a.updatedAt||a.createdAt));
  }

  const el = document.getElementById('mlist');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ic">👥</div><div class="empty-t">${q?'没找到':'还没有会员'}</div><div class="empty-s">${q?'换个关键词试试':'点右上角 + 号添加第一位会员'}</div></div>`;
    return;
  }
  el.innerHTML = `<div class="lcard mx">` + list.map(m => {
    const r = stats[m.id]||0;
    const bc = r===0?'out':r<=3?'low':'';
    return `<div class="mi" onclick="navigate('member',{id:'${m.id}'})">
      <div class="av">${esc(m.name[0]||'')}</div>
      <div style="flex:1"><div class="mn">${esc(m.name)}</div>${m.phone?`<div class="mp">${esc(m.phone)}</div>`:''}</div>
      <span class="badge ${bc}">${r}次</span>
    </div>`;
  }).join('') + '</div>';
}


// ── View: Stats (按月/年切换) ─────────────────────────────────
// Implements month/year period navigation and aggregates members/cards/txn data for the selected period.
const STATS_STATE = { mode: 'month', ts: Date.now() };

function periodBounds(mode, ts) {
  const d = new Date(ts);
  if (mode === 'month') {
    const start = new Date(d.getFullYear(), d.getMonth(), 1).getTime();
    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1).getTime();
    return {start, end: next};
  } else {
    const start = new Date(d.getFullYear(), 0, 1).getTime();
    const next = new Date(d.getFullYear() + 1, 0, 1).getTime();
    return {start, end: next};
  }
}

function formatPeriodLabel(mode, ts) {
  const d = new Date(ts);
  if (mode === 'month') return `${d.getFullYear()}年${d.getMonth() + 1}月`;
  return `${d.getFullYear()}年`;
}

window.prevPeriod = function() {
  const s = STATS_STATE;
  const d = new Date(s.ts);
  if (s.mode === 'month') d.setMonth(d.getMonth() - 1);
  else d.setFullYear(d.getFullYear() - 1);
  s.ts = d.getTime();
  vStats();
};
window.nextPeriod = function() {
  const s = STATS_STATE;
  const d = new Date(s.ts);
  if (s.mode === 'month') d.setMonth(d.getMonth() + 1);
  else d.setFullYear(d.getFullYear() + 1);
  s.ts = d.getTime();
  vStats();
};
window.setStatMode = function(m) {
  if (m !== 'month' && m !== 'year') return;
  STATS_STATE.mode = m;
  // normalize ts to start of period
  const d = new Date(STATS_STATE.ts);
  if (m === 'month') {
    STATS_STATE.ts = new Date(d.getFullYear(), d.getMonth(), 1).getTime();
  } else {
    STATS_STATE.ts = new Date(d.getFullYear(), 0, 1).getTime();
  }
  vStats();
};

async function vStats() {
  const mode = STATS_STATE.mode;
  const ts = STATS_STATE.ts;
  const pb = periodBounds(mode, ts);
  // render shell first
  document.getElementById('app').innerHTML = `
    <div class="nav">
      <button class="nav-btn" onclick="goBack()">‹ 返回</button>
      <div class="nav-title">数据统计</div>
      <button class="nav-btn" style="visibility:hidden"> </button>
    </div>
    <div class="page no-ptr">
      <div style="padding:12px 16px">
        <div class="st-period">
          <button class="st-arrow" onclick="prevPeriod()">‹</button>
          <div class="st-label">${formatPeriodLabel(mode, ts)}</div>
          <button class="st-arrow" onclick="nextPeriod()">›</button>
        </div>

        <div class="st-mode">
          <button class="${mode==='month'?'on':''}" onclick="setStatMode('month')">按月</button>
          <button class="${mode==='year'?'on':''}" onclick="setStatMode('year')">按年</button>
        </div>

        <div id="st-body">
          <div style="padding:20px;text-align:center;color:var(--text2)">正在计算…</div>
        </div>
      </div>
    </div>`;

  // compute data
  const [members, cards, txns] = await Promise.all([DB.getAll('members'), DB.getAll('cards'), DB.getAll('txns')]);
  const inRange = t => t >= pb.start && t < pb.end;

  // members
  const newMembers = members.filter(m => m.createdAt && inRange(m.createdAt));

  // cards opened in period (by createdAt) and charge txns in period
  const newCards = cards.filter(c => c.createdAt && inRange(c.createdAt));
  const chargeTxns = txns.filter(t => t.type === 'charge' && t.createdAt && inRange(t.createdAt));
  const chargeSessions = chargeTxns.reduce((s,t)=>s+(t.sessions||0),0);
  const revenue = chargeTxns.reduce((s,t)=>s+((t.paid||0)),0);

  // uses (consumption)
  const useTxns = txns.filter(t => t.type === 'use' && t.createdAt && inRange(t.createdAt));
  const useCount = useTxns.reduce((s,t)=>s+(t.sessions||1),0); // sessions often 1 for 'use'

  // active members: unique members who had any txn in period
  const actSet = new Set();
  txns.forEach(t => { if (t.createdAt && inRange(t.createdAt) && t.memberId) actSet.add(t.memberId); });
  const activeMembers = actSet.size;

  // remaining sessions added this period minus used this period (net new sessions)
  const addedSessions = cards.filter(c => c.createdAt && inRange(c.createdAt)).reduce((s,c)=>s+(c.total||0),0);
  const netSessions = addedSessions - useCount;

  const stBody = document.getElementById('st-body');
  stBody.innerHTML = `
    <div class="st-grid">
      <div class="st-card">
        <div class="st-val blue">${newMembers.length}</div>
        <div class="st-lbl">新增会员</div>
      </div>
      <div class="st-card">
        <div class="st-val">${activeMembers}</div>
        <div class="st-lbl">活跃会员（有操作）</div>
      </div>
      <div class="st-card">
        <div class="st-val">${newCards.length}</div>
        <div class="st-lbl">新增次卡（张）</div>
      </div>
      <div class="st-card">
        <div class="st-val green">${useCount}</div>
        <div class="st-lbl">划卡消费（次）</div>
      </div>
    </div>

    <div class="st-break">
      <div class="st-break-title">明细</div>
      <div class="st-break-row"><div class="st-b-name">充值次数</div><div class="st-b-val">${chargeSessions} 次</div></div>
      <div class="st-break-row"><div class="st-b-name">充值金额</div><div class="st-b-val">¥${revenue}</div></div>
      <div class="st-break-row"><div class="st-b-name">本期新增可用次数（充入 - 消费）</div><div class="st-b-val">${netSessions} 次</div></div>
    </div>`;
}

function promptNote({title, sub, placeholder, quick}) {
  return new Promise(resolve => {
    const mask = document.createElement('div');
    mask.className = 'modal-mask';
    mask.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-body">
          <div class="modal-title">${title}</div>
          ${sub?`<div class="modal-sub">${sub}</div>`:''}
          <textarea class="modal-input" id="m-note" rows="2" placeholder="${placeholder||'选填备注，如发型/项目'}" maxlength="60"></textarea>
          ${quick&&quick.length?`<div class="modal-quick">${quick.map(q=>`<button type="button" class="modal-chip" data-q="${q}">${q}</button>`).join('')}</div>`:''}
        </div>
        <div class="modal-acts">
          <button class="modal-act" data-act="cancel">取消</button>
          <button class="modal-act primary" data-act="ok">确认划卡</button>
        </div>
      </div>`;
    const close = v => { mask.remove(); resolve(v); };
    mask.addEventListener('click', e => { if (e.target===mask) close(null); });
    mask.querySelectorAll('.modal-chip').forEach(b => {
      b.onclick = () => {
        const ta = mask.querySelector('#m-note');
        ta.value = ta.value ? ta.value+' '+b.dataset.q : b.dataset.q;
        ta.focus();
      };
    });
    mask.querySelector('[data-act="cancel"]').onclick = () => close(null);
    mask.querySelector('[data-act="ok"]').onclick = () => {
      const v = mask.querySelector('#m-note').value.trim();
      close({note:v});
    };
    document.body.appendChild(mask);
    setTimeout(()=>mask.querySelector('#m-note')?.focus(), 80);
  });
}

// 通用对话框：支持自定义 html、按钮文案、validate（返回 false 阻止关闭、返回值作为 resolve）
function showDialog({title, sub, html, confirmText='确认', cancelText='取消', validate}) {
  return new Promise(resolve => {
    const mask = document.createElement('div');
    mask.className = 'modal-mask';
    mask.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-body">
          <div class="modal-title">${title}</div>
          ${sub?`<div class="modal-sub">${sub}</div>`:''}
          ${html||''}
        </div>
        <div class="modal-acts">
          <button class="modal-act" data-act="cancel">${cancelText}</button>
          <button class="modal-act primary" data-act="ok">${confirmText}</button>
        </div>
      </div>`;
    const close = v => { mask.remove(); resolve(v); };
    mask.addEventListener('click', e => { if (e.target===mask) close(null); });
    mask.querySelector('[data-act="cancel"]').onclick = () => close(null);
    mask.querySelector('[data-act="ok"]').onclick = async () => {
      const v = validate ? validate(mask) : true;
      if (v === false || v == null) return;
      close(v);
    };
    document.body.appendChild(mask);
    setTimeout(() => mask.querySelector('input,textarea')?.focus(), 80);
  });
}

// 自定义确认弹窗，替代原生 confirm()，统一 iOS 风格
function confirmDialog({title, message, confirmText='确认', cancelText='取消', danger=false}) {
  return new Promise(resolve => {
    const mask = document.createElement('div');
    mask.className = 'modal-mask';
    mask.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-body">
          <div class="modal-title">${title}</div>
          ${message ? `<div class="modal-sub" style="white-space:pre-line">${message}</div>` : ''}
        </div>
        <div class="modal-acts">
          <button class="modal-act" data-act="cancel">${cancelText}</button>
          <button class="modal-act primary${danger ? ' danger' : ''}" data-act="ok">${confirmText}</button>
        </div>
      </div>`;
    const close = v => { mask.remove(); resolve(v); };
    mask.addEventListener('click', e => { if (e.target === mask) close(false); });
    mask.querySelector('[data-act="cancel"]').onclick = () => close(false);
    mask.querySelector('[data-act="ok"]').onclick = () => close(true);
    document.body.appendChild(mask);
  });
}

// 选卡弹窗（多卡时按类型选择扣哪张卡）
function pickCard(cards, memberName) {
  return new Promise(resolve => {
    const mask = document.createElement('div');
    mask.className = 'modal-mask';
    const items = cards.map((c,i) => {
      const r = c.total - c.used;
      const typeLabel = c.type ? typeBadge(c.type) : '';
      return `<div class="card-pick-item${i===0?' sel':''}" data-idx="${i}">
        <div class="cpi-left">
          <div class="cpi-info">
            <div class="cpi-title">${typeLabel}${c.total}次卡</div>
            <div class="cpi-sub">${fmtFull(c.createdAt)}</div>
          </div>
        </div>
        <div class="cpi-remain">${r}</div>
      </div>`;
    }).join('');
    mask.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-body">
          <div class="modal-title">选择扣减的卡</div>
          <div class="modal-sub">${esc(memberName)} · 剩余 ${cards.length} 张卡可用</div>
          ${items}
        </div>
        <div class="modal-acts">
          <button class="modal-act" data-act="cancel">取消</button>
          <button class="modal-act primary" data-act="ok">确认</button>
        </div>
      </div>`;
    let selIdx = 0;
    const close = v => { mask.remove(); resolve(v); };
    mask.addEventListener('click', e => { if (e.target===mask) close(null); });
    mask.querySelectorAll('.card-pick-item').forEach(el => {
      el.onclick = () => {
        mask.querySelectorAll('.card-pick-item').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        selIdx = parseInt(el.dataset.idx);
      };
    });
    mask.querySelector('[data-act="cancel"]').onclick = () => close(null);
    mask.querySelector('[data-act="ok"]').onclick = () => close(cards[selIdx]);
    document.body.appendChild(mask);
  });
}

let _doUseInFlight = false;
window.doUse = async function(memberId) {
  if (_doUseInFlight) return;            // 防连击：promptNote 弹出期间再次点击直接忽略
  _doUseInFlight = true;
  try {
    const cards = await DB.byIdx('cards','mid',memberId);
    const activeCards = cards.filter(c=>c.total>c.used).sort((a,b)=>a.createdAt-b.createdAt);
    if (!activeCards.length) { toast('没有剩余次数'); return; }

    const member = await DB.get('members', memberId);

    // 多张卡时让用户选，单张卡自动选
    let card;
    if (activeCards.length === 1) {
      card = activeCards[0];
    } else {
      card = await pickCard(activeCards, member.name);
      if (!card) return;
    }

    const result = await promptNote({
      title: '划卡消费',
      sub: `${esc(member.name)} · ${card.type?esc(card.type)+'·':''}剩余 ${card.total-card.used} 次`,
      placeholder: '选填备注',
      quick: ['剪发','洗剪吹','烫发','染发','造型']
    });
    if (result === null) return;

    card.used += 1;
    const now = Date.now();
    card.updatedAt = now;
    member.updatedAt = now;
    const note = result.note || '';
    // 原子写：cards / txns / members 同一事务，避免中途失败导致 used 与 txn 不一致
    await DB.multi([
      {op:'put', store:'cards', obj:card},
      {op:'put', store:'txns', obj:{id:uid(), memberId, cardId:card.id, cardType:card.type||'', type:'use', sessions:1, note, createdAt:now}},
      {op:'put', store:'members', obj:member},
    ]);

    const all = await DB.byIdx('cards','mid',memberId);
    const remain = all.reduce((s,c)=>s+(c.total-c.used),0);
    toast(remain<=3 && remain>0 ? `已划卡！仅剩 ${remain} 次，建议续卡 🔔` : `划卡成功！剩余 ${remain} 次`);
    vMember();
  } finally {
    _doUseInFlight = false;
  }
};

window.doDelete = async function(id) {
  const ok = await confirmDialog({
    title: '删除此会员？',
    message: '该会员及全部次卡、操作记录将被删除，无法恢复。',
    confirmText: '删除',
    danger: true
  });
  if (!ok) return;
  const [cards, txns] = await Promise.all([DB.byIdx('cards','mid',id), DB.byIdx('txns','mid',id)]);
  const now = Date.now();
  // 墓碑 + 实际删除：放在同一事务，避免半截状态
  const ops = [
    {op:'put', store:'deleted', obj:{id, type:'member', deletedAt:now}},
    ...cards.map(c => ({op:'put', store:'deleted', obj:{id:c.id, type:'card', deletedAt:now}})),
    ...txns.map(t => ({op:'put', store:'deleted', obj:{id:t.id, type:'txn',  deletedAt:now}})),
    {op:'del', store:'members', id},
    ...cards.map(c => ({op:'del', store:'cards', id:c.id})),
    ...txns.map(t => ({op:'del', store:'txns',  id:t.id})),
  ];
  await DB.multi(ops);
  toast('已删除');
  goTab('home');
};

window.saveNewMember = async function() {
  const name = (document.getElementById('f-name')?.value||'').trim();
  if (!name) { toast('请填写姓名'); return; }
  const phone = (document.getElementById('f-phone')?.value||'').trim();
  if (!phone) { toast('请填写手机号'); return; }

  // 顺带开卡：先把所有校验做完，再统一落库；否则会员会"裸"入库（无卡僵尸会员）
  const cardType = getType('f');
  const sessions = parseInt(document.getElementById('f-sessions')?.value)||0;
  const paidRaw = document.getElementById('f-paid')?.value;
  const note = (document.getElementById('f-note')?.value||'').trim();
  const hasCardInput = cardType || sessions > 0 || (paidRaw !== undefined && paidRaw !== '');
  let cardWrites = [];
  if (hasCardInput) {
    if (!cardType) { toast('请选择卡类型'); return; }
    if (sessions <= 0) { toast('请填写次数'); return; }
    const paid = parseFloat(paidRaw);
    if (!Number.isFinite(paid) || paid < 0) { toast('请填写实收金额'); return; }
    const now0 = Date.now();
    const memberId = uid();
    const cardId = uid();
    cardWrites = [
      {op:'put', store:'cards', obj:{id:cardId, memberId, type:cardType, total:sessions, used:0, paid, note, createdAt:now0, updatedAt:now0}},
      {op:'put', store:'txns',  obj:{id:uid(), memberId, cardId, cardType, type:'charge', sessions, paid, note, createdAt:now0}},
    ];
    cardWrites._memberId = memberId;
    cardWrites._now = now0;
  }

  const now = cardWrites._now || Date.now();
  const memberId = cardWrites._memberId || uid();
  const member = {id:memberId, name, phone, createdAt:now, updatedAt:now};
  // 原子写：会员 + 卡 + 充值流水同一事务，要么全成、要么全败
  await DB.multi([{op:'put', store:'members', obj:member}, ...cardWrites]);
  toast('已添加');
  stack = [];
  navigate('member', {id:member.id}, false);
};

// ── 下拉刷新 ─────────────────────────────────────────
(() => {
  const THRESHOLD = 70;
  let sy = 0, pulling = false, refreshing = false;
  let ptrEl = null, spinner = null, page = null;

  const ensurePtr = (pg) => {
    // 把 ptr 放到当前 .page 里（sticky 定位，跟随滚动内容）
    if (ptrEl && ptrEl.parentNode === pg) return;
    if (ptrEl) ptrEl.remove();
    ptrEl = document.createElement('div');
    ptrEl.id = 'ptr';
    ptrEl.className = 'ptr';
    ptrEl.innerHTML = '<div class="ptr-spinner">↓</div>';
    pg.prepend(ptrEl);
    spinner = ptrEl.querySelector('.ptr-spinner');
    page = pg;
  };

    document.addEventListener('touchstart', e => {
    if (refreshing) return;
    const pg = e.target.closest('.page');
    // 如果页面标记了 no-ptr，则禁用下拉刷新（用于统计/备份页）
    if (!pg || pg.scrollTop > 5 || pg.classList.contains('no-ptr')) return;
    ensurePtr(pg);
    sy = e.touches[0].clientY;
    pulling = true;
    }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    // 页面已重建（ptrEl 脱离 DOM），取消下拉
    if (!ptrEl || !ptrEl.isConnected) { pulling = false; ptrEl = null; return; }
    const dy = e.touches[0].clientY - sy;
    if (dy < 0) { ptrEl.style.transition = ''; ptrEl.style.height = '0px'; pulling = false; return; }
    ptrEl.style.transition = 'none'; // 拖动时禁用过渡，避免卡顿
    const h = Math.min(dy * 0.45, 110);
    ptrEl.style.height = h + 'px';
    spinner.style.transform = 'rotate(' + Math.min(dy*2.5,360) + 'deg)';
    spinner.style.opacity = Math.min(dy / THRESHOLD, 1);
  }, {passive:true});

  document.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    // 页面已重建，跳过同步
    if (!ptrEl || !ptrEl.isConnected) { ptrEl = null; return; }
    const h = parseInt(ptrEl.style.height) || 0;
    if (h < THRESHOLD * 0.45) { ptrEl.style.transition = ''; ptrEl.style.height = '0px'; return; }
    // 触发刷新
    refreshing = true;
    ptrEl.style.transition = ''; // 恢复过渡动画
    ptrEl.style.height = '46px';
    ptrEl.classList.add('active');
    spinner.style.opacity = '1';
    try {
      await Cloud.autoSync();
    } catch(e) { console.warn('[ptr]', e); }
    ptrEl.classList.remove('active');
    ptrEl.style.height = '0px';
    refreshing = false;
  });
})();

// ── Service Worker 注册 ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(() => {}); // 静默失败不影响使用
  });
}
</script>
